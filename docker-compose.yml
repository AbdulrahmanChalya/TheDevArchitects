services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      VITE_BACKEND_URL: http://localhost:8000
    volumes:
      - ./backend:/backend:ro
    depends_on:
      - backend

  backend:
    build:
      context: ./backend/nest-js-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 8000
      SCRAPER_BASE_URL: http://scraper:5001
    depends_on:
      - scraper

  scraper:
    build:
      context: ./backend/scraping_api
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./backend/scraping_api/.env
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
